<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="static/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <!-- Header -->
        <div class="row">
            <div class="col-12">
                <div class="header-section">
                    <h1 class="app-title">
                        <i class="bi bi-check2-square me-2"></i>
                        To-Do List Manager
                    </h1>
                    <p class="app-subtitle">Organize your tasks efficiently</p>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="controls-section">
                    <button id="addTaskBtn" class="btn btn-primary me-2">
                        <i class="bi bi-plus-circle me-1"></i>
                        Add Task
                    </button>
                    <button id="saveTasksBtn" class="btn btn-success me-2">
                        <i class="bi bi-floppy me-1"></i>
                        Save Tasks
                    </button>
                    <button id="loadTasksBtn" class="btn btn-info">
                        <i class="bi bi-arrow-repeat me-1"></i>
                        Load Tasks
                    </button>
                </div>
            </div>
        </div>

        <!-- Messages -->
        <div class="row">
            <div class="col-12">
                <div id="messageContainer"></div>
            </div>
        </div>

        <!-- Tasks Table -->
        <div class="row">
            <div class="col-12">
                <div class="table-container">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th scope="col" width="5%">#</th>
                                <th scope="col" width="25%">Folder Link</th>
                                <th scope="col" width="30%">Task Brief</th>
                                <th scope="col" width="35%">Notes</th>
                                <th scope="col" width="5%">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tasksTableBody">
                            <!-- Tasks will be populated here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div class="row" id="emptyState" style="display: none;">
            <div class="col-12 text-center">
                <div class="empty-state">
                    <i class="bi bi-clipboard-x display-1 text-muted"></i>
                    <h3 class="mt-3 text-muted">No tasks yet</h3>
                    <p class="text-muted">Click "Add Task" to create your first task or "Load Tasks" to fetch existing ones.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="static/script.js"></script>
</body>
</html>
